<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Porra de la Selección</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 2rem; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #385b94; margin-top: 0; border-bottom: 2px solid #e2f2ff; padding-bottom: 1rem; }
        .login-box { text-align: center; padding: 3rem; }
        input, button { padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { background-color: #c98c5b; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #b37b4f; }
        .match-admin-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; background: #fafafa; }
        .match-admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .score-editor { background: #e2f2ff; padding: 1rem; border-radius: 8px; display: flex; align-items: center; gap: 1rem; }
        .score-editor input { width: 60px; text-align: center; }
        .admin-btn { background-color: #385b94; }
        .admin-btn:hover { background-color: #2a4570; }
        .delete-btn { background-color: #d32f2f; padding: 0.4rem 0.8rem; font-size: 0.9rem; }
        .delete-btn:hover { background-color: #b71c1c; }
        .edit-btn { background-color: #3a83b3; padding: 0.4rem 0.8rem; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>🔐 Panel de Control</h1>
        
        <div id="login-section" class="login-box">
            <p>Introduce el código de acceso para administrar los partidos y las apuestas.</p>
            <input type="password" id="admin-code" placeholder="Código secreto" onkeydown="if(event.key === 'Enter') login()">
            <button onclick="login()">Entrar</button>
        </div>

        <div id="admin-content" style="display: none;">
            <p style="color: #666; margin-bottom: 2rem;">Cualquier cambio que guardes aquí se reflejará instantáneamente en la web pública para todos los usuarios.</p>
            <div id="matches-admin-container"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
